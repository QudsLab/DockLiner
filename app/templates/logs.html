{% extends "base.html" %}
{% block title %}Logs — {{ project.name if project else '?' }}{% endblock %}
{% block content %}
<h1 class="hero-title">Logs</h1>
<p class="section-subtitle">{{ project.name if project else 'Unknown' }} — compose logs (last 200 lines)</p>
<div class="card">
  <pre class="log-window">{{ logs or 'No logs.' }}</pre>
</div>
<div style="margin-top:12px;">
  <a class="btn btn-secondary" href="/projects">Back to Projects</a>
  <a class="btn btn-secondary" href="/">Back to Dashboard</a>
</div>
{% endblock %}
